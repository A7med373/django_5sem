apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.locustfile.configMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "locust.labels" . | indent 4 }}
data:
  {{ .Values.locustfile.key }}: |
    from random import choice

    from locust import HttpUser, between, task


    class FoodgramApiUser(HttpUser):
        wait_time = between(1, 3)

        @task(4)
        def list_recipes(self):
            self.client.get("/api/recipes/", name="/api/recipes/")

        @task(2)
        def list_ingredients(self):
            query = choice(["a", "s", "m", "o", ""])
            self.client.get(
                f"/api/ingredients/?name={query}",
                name="/api/ingredients/?name=[query]",
            )

        @task(1)
        def recipe_detail(self):
            self.client.get("/api/recipes/1/", name="/api/recipes/[id]/")
