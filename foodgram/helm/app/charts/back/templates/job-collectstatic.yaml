apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-collectstatic
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
{{ include "back.labels" . | indent 4 }}
spec:
  template:
    spec:
      containers:
      - name: {{ .Chart.Name }}-collectstatic
        {{- with .Values.deployment.image }}
        image: {{ printf "%s:%s" .name .tag }}
        {{- end }}
        command: ["python", "manage.py", "collectstatic", "--no-input"]
        volumeMounts:
        - name: {{ .Chart.Name }}-static
          mountPath: {{ .Values.jobCollectstatic.mountPath }}
      restartPolicy: {{ .Values.jobCollectstatic.restartPolicy }}

      volumes:
      - name: {{ .Chart.Name }}-static
        persistentVolumeClaim:
          claimName: {{ include "back.staticName" . }}
  backoffLimit: {{ .Values.jobCollectstatic.backoffLimit }}
