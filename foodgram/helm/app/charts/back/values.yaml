nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

deployment:
  replicas: 3
  image:
    name: a7med373/foodgram-st
    tag: v.2.1
  ports:
    containerPort: 8000
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  volumeMounts:
    staticMountPath: /app/backend_static/
    mediaMountPath: /app/backend_media/
  env:
    values: {}
    config:
      DB_PORT: DB_PORT
      DB_HOST: DB_HOST
    secret:
      DB_NAME: postgres-name
      DB_USER: postgres-user
      DB_PASSWORD: postgres-password
  pvc:
    static:
      pvcName: static-pvc
    media:
      pvcName: media-pvc

importDataJob:
  restartPolicy: OnFailure
  backoffLimit: 4

jobCollectstatic:
  mountPath: /app/backend_static/
  restartPolicy: OnFailure
  backoffLimit: 4

jobMigrate:
  restartPolicy: OnFailure
  backoffLimit: 4

service:
  type: ClusterIP
  ports:
    protocol: TCP
    port: 8000
    targetPort: 8000

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: null
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max

vpa:
  enabled: true
  updateMode: "Off"
  controlledResources:
    - cpu
    - memory
  minAllowed:
    cpu: 100m
    memory: 128Mi
  maxAllowed:
    cpu: "1"
    memory: 1Gi

persistence:
  static:
    storage: 5Gi
    storageClassName: standard
  media:
    storage: 10Gi
    storageClassName: standard

global:
  secret:
    name: db-secret
  config:
    name: db-config
  mediaPvc:
    name: media-pvc
  staticPvc:
    name: static-pvc
