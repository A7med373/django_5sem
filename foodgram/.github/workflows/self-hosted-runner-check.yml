name: Self-hosted runner check

on:
  workflow_dispatch:

jobs:
  check:
    name: Run on foodgram runner
    runs-on: foodgram
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          uname -a
