name: Foodgram CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: foodgram-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release tag
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/changelog
            @semantic-release/github
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and push images
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      image_tag: ${{ needs.release.outputs.git_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.git_tag }}

      - name: Set image names
        id: images
        shell: bash
        run: |
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "backend_image=${image_namespace}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${image_namespace}/frontend" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./foodgram/backend
          file: ./foodgram/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}:${{ needs.release.outputs.git_tag }}
            ${{ steps.images.outputs.backend_image }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./foodgram/frontend
          file: ./foodgram/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.images.outputs.frontend_image }}:${{ needs.release.outputs.git_tag }}
            ${{ steps.images.outputs.frontend_image }}:latest

  deploy:
    name: Deploy release
    needs:
      - release
      - docker
    if: needs.release.outputs.published == 'true'
    runs-on: foodgram
    environment: production
    env:
      RELEASE_NAME: foodgram
      NAMESPACE: foodgram
      HELM_SECRETS_BACKEND: vals
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.git_tag }}

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          if [[ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]]; then
            token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
            ca_path="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            cat > "$HOME/.kube/config" <<EOF
          apiVersion: v1
          kind: Config
          clusters:
          - name: in-cluster
            cluster:
              certificate-authority: ${ca_path}
              server: https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}
          contexts:
          - name: in-cluster
            context:
              cluster: in-cluster
              namespace: ${NAMESPACE}
              user: runner
          current-context: in-cluster
          users:
          - name: runner
            user:
              token: ${token}
          EOF
          elif [[ -n "${KUBECONFIG_B64}" ]]; then
            echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          else
            echo "No in-cluster service account token or KUBECONFIG_B64 secret found" >&2
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install vals
        shell: bash
        run: |
          curl -sSL https://github.com/helmfile/vals/releases/download/v0.44.0/vals_0.44.0_linux_amd64.tar.gz -o vals.tar.gz
          tar -xzf vals.tar.gz vals
          mkdir -p "$HOME/.local/bin"
          mv vals "$HOME/.local/bin/vals"
          chmod +x "$HOME/.local/bin/vals"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install helm plugins
        shell: bash
        run: |
          helm plugin list | grep -q '^secrets' || helm plugin install https://github.com/jkroepke/helm-secrets

      - name: Build chart dependencies
        run: helm dependency build ./foodgram/helm/app

      - name: Deploy Helm chart
        shell: bash
        run: |
          helm secrets --evaluate-templates -b vals upgrade --install "$RELEASE_NAME" ./foodgram/helm/app \
            --namespace "$NAMESPACE" \
            -f ./foodgram/helm/app/values.yaml \
            --set back.deployment.image.name="${{ needs.docker.outputs.backend_image }}" \
            --set back.deployment.image.tag="${{ needs.docker.outputs.image_tag }}" \
            --set front.deployment.image.name="${{ needs.docker.outputs.frontend_image }}" \
            --set front.deployment.image.tag="${{ needs.docker.outputs.image_tag }}"
